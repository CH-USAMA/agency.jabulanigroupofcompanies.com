<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <defs>
    <linearGradient id="storeBanner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d1d1f"/>
      <stop offset="100%" stop-color="#3a3a3c"/>
    </linearGradient>
    <linearGradient id="storeAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4641f0"/>
      <stop offset="100%" stop-color="#7c70f5"/>
    </linearGradient>
    <linearGradient id="storeProd1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0ff"/>
      <stop offset="100%" stop-color="#c7b8f8"/>
    </linearGradient>
    <linearGradient id="storeProd2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="storeProd3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- BG -->
  <rect width="480" height="280" fill="#f9f9fb"/>

  <!-- ── NAV ── -->
  <rect width="480" height="48" fill="#ffffff"/>
  <line x1="0" y1="48" x2="480" y2="48" stroke="#e8e8ed" stroke-width="1"/>
  <!-- Logo -->
  <rect x="16" y="14" width="130" height="20" rx="5" fill="rgba(0,0,0,0.04)"/>
  <rect x="24" y="18" width="22" height="12" rx="3" fill="#1d1d1f"/>
  <rect x="52" y="19" width="68" height="10" rx="3" fill="#1d1d1f" opacity="0.8"/>
  <!-- Nav links -->
  <rect x="200" y="20" width="32" height="8" rx="3" fill="rgba(29,29,31,0.40)"/>
  <rect x="242" y="20" width="32" height="8" rx="3" fill="rgba(29,29,31,0.40)"/>
  <rect x="284" y="20" width="32" height="8" rx="3" fill="rgba(29,29,31,0.40)"/>
  <rect x="326" y="20" width="32" height="8" rx="3" fill="rgba(29,29,31,0.40)"/>
  <!-- Cart icon -->
  <circle cx="398" cy="24" r="12" fill="rgba(70,65,240,0.08)"/>
  <rect x="392" y="20" width="12" height="9" rx="2" fill="#4641f0" opacity="0.7"/>
  <circle cx="393" cy="31" r="2" fill="#4641f0"/>
  <circle cx="402" cy="31" r="2" fill="#4641f0"/>
  <!-- Cart badge -->
  <circle cx="408" cy="16" r="6" fill="#4641f0"/>
  <rect x="405" y="13" width="6" height="6" rx="1" fill="rgba(255,255,255,0.9)"/>
  <!-- Login -->
  <rect x="418" y="14" width="50" height="20" rx="10" fill="url(#storeAccent)"/>
  <rect x="426" y="20" width="34" height="8" rx="2" fill="rgba(255,255,255,0.9)"/>

  <!-- ── HERO BANNER ── -->
  <rect x="0" y="48" width="480" height="80" fill="url(#storeBanner)"/>
  <!-- Banner accent shapes -->
  <circle cx="420" cy="88" r="50" fill="rgba(70,65,240,0.20)"/>
  <circle cx="380" cy="68" r="30" fill="rgba(70,65,240,0.15)"/>
  <!-- Banner text -->
  <rect x="24" y="64" width="50" height="6" rx="2" fill="rgba(255,255,255,0.40)"/>
  <rect x="24" y="76" width="180" height="16" rx="4" fill="rgba(255,255,255,0.95)"/>
  <rect x="24" y="98" width="120" height="8" rx="3" fill="rgba(255,255,255,0.55)"/>
  <!-- Banner CTA -->
  <rect x="24" y="112" width="80" height="22" rx="11" fill="url(#storeAccent)"/>
  <rect x="36" y="119" width="56" height="8" rx="2" fill="rgba(255,255,255,0.9)"/>

  <!-- ── FILTERS BAR ── -->
  <rect x="0" y="128" width="480" height="28" fill="#ffffff"/>
  <line x1="0" y1="156" x2="480" y2="156" stroke="#e8e8ed" stroke-width="1"/>
  <rect x="16" y="137" width="40" height="10" rx="5" fill="rgba(70,65,240,0.12)"/>
  <rect x="18" y="140" width="36" height="5" rx="2" fill="#4641f0" opacity="0.55"/>
  <rect x="66" y="137" width="40" height="10" rx="5"/>
  <rect x="68" y="140" width="36" height="5" rx="2" fill="rgba(29,29,31,0.30)"/>
  <rect x="116" y="137" width="40" height="10" rx="5"/>
  <rect x="118" y="140" width="36" height="5" rx="2" fill="rgba(29,29,31,0.30)"/>
  <rect x="166" y="137" width="40" height="10" rx="5"/>
  <rect x="168" y="140" width="36" height="5" rx="2" fill="rgba(29,29,31,0.30)"/>
  <!-- Sort right -->
  <rect x="380" y="137" width="84" height="10" rx="5" fill="rgba(29,29,31,0.05)"/>
  <rect x="390" y="140" width="60" height="5" rx="2" fill="rgba(29,29,31,0.28)"/>

  <!-- ── PRODUCT GRID ── -->
  <!-- Product 1 -->
  <rect x="16" y="166" width="134" height="104" rx="12" fill="#ffffff" stroke="#e8e8ed" stroke-width="1"/>
  <rect x="16" y="166" width="134" height="62" rx="12" fill="url(#storeProd1)"/>
  <rect x="16" y="204" width="134" height="24" rx="0" fill="url(#storeProd1)" opacity="0.5"/>
  <!-- Product 1 image placeholder - abstract shape -->
  <circle cx="83" cy="197" r="22" fill="rgba(70,65,240,0.25)"/>
  <rect x="72" y="188" width="22" height="18" rx="4" fill="rgba(70,65,240,0.50)"/>
  <!-- Product 1 info -->
  <rect x="24" y="236" width="80" height="8" rx="3" fill="#1d1d1f" opacity="0.80)"/>
  <rect x="24" y="250" width="50" height="7" rx="2" fill="#4641f0" opacity="0.75"/>
  <rect x="118" y="248" width="24" height="14" rx="7" fill="url(#storeAccent)"/>
  <rect x="122" y="252" width="16" height="6" rx="2" fill="rgba(255,255,255,0.9)"/>

  <!-- Product 2 -->
  <rect x="162" y="166" width="134" height="104" rx="12" fill="#ffffff" stroke="#e8e8ed" stroke-width="1"/>
  <rect x="162" y="166" width="134" height="62" rx="12" fill="url(#storeProd2)"/>
  <rect x="162" y="204" width="134" height="24" rx="0" fill="url(#storeProd2)" opacity="0.5"/>
  <circle cx="229" cy="197" r="22" fill="rgba(236,72,153,0.22)"/>
  <rect x="218" y="188" width="22" height="18" rx="4" fill="rgba(236,72,153,0.50)"/>
  <rect x="170" y="236" width="80" height="8" rx="3" fill="#1d1d1f" opacity="0.80"/>
  <rect x="170" y="250" width="50" height="7" rx="2" fill="#4641f0" opacity="0.75"/>
  <!-- Sale badge -->
  <rect x="162" y="168" width="36" height="16" rx="8" fill="#ef4444"/>
  <rect x="167" y="172" width="26" height="8" rx="2" fill="rgba(255,255,255,0.9)"/>
  <rect x="264" y="248" width="24" height="14" rx="7" fill="url(#storeAccent)"/>
  <rect x="268" y="252" width="16" height="6" rx="2" fill="rgba(255,255,255,0.9)"/>

  <!-- Product 3 -->
  <rect x="308" y="166" width="134" height="104" rx="12" fill="#ffffff" stroke="#e8e8ed" stroke-width="1"/>
  <rect x="308" y="166" width="134" height="62" rx="12" fill="url(#storeProd3)"/>
  <rect x="308" y="204" width="134" height="24" rx="0" fill="url(#storeProd3)" opacity="0.5"/>
  <circle cx="375" cy="197" r="22" fill="rgba(16,185,129,0.25)"/>
  <rect x="364" y="188" width="22" height="18" rx="4" fill="rgba(16,185,129,0.55)"/>
  <rect x="316" y="236" width="80" height="8" rx="3" fill="#1d1d1f" opacity="0.80"/>
  <rect x="316" y="250" width="50" height="7" rx="2" fill="#4641f0" opacity="0.75"/>
  <rect x="410" y="248" width="24" height="14" rx="7" fill="url(#storeAccent)"/>
  <rect x="414" y="252" width="16" height="6" rx="2" fill="rgba(255,255,255,0.9)"/>
</svg>

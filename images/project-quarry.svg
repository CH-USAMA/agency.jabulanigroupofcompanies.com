<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <defs>
    <linearGradient id="qSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0101"/>
      <stop offset="100%" stop-color="#2a0808"/>
    </linearGradient>
    <linearGradient id="qCards" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120404"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </linearGradient>
    <radialGradient id="qGlow" cx="30%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#b31818" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b31818" stop-opacity="0"/>
    </radialGradient>
    <filter id="qBlur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="280" fill="url(#qSky)"/>
  <rect width="480" height="280" fill="url(#qGlow)"/>

  <!-- ── NAV ── -->
  <rect width="480" height="48" fill="rgba(0,0,0,0.82)"/>
  <rect x="0" y="48" width="480" height="1" fill="rgba(179,24,24,0.4)"/>
  <!-- Logo circle -->
  <circle cx="26" cy="24" r="11" fill="#b31818"/>
  <path d="M21,24 L26,18 L31,24 L26,30 Z" fill="rgba(255,255,255,0.5)"/>
  <!-- Brand text -->
  <rect x="44" y="17" width="58" height="8" rx="3" fill="rgba(255,255,255,0.88)"/>
  <rect x="44" y="29" width="38" height="5" rx="2" fill="rgba(255,255,255,0.35)"/>
  <!-- Nav links right -->
  <rect x="258" y="20" width="30" height="7" rx="3" fill="rgba(255,255,255,0.50)"/>
  <rect x="298" y="20" width="38" height="7" rx="3" fill="rgba(255,255,255,0.50)"/>
  <rect x="346" y="20" width="30" height="7" rx="3" fill="rgba(255,255,255,0.50)"/>
  <rect x="386" y="20" width="30" height="7" rx="3" fill="rgba(255,255,255,0.50)"/>
  <!-- Nav CTA pill -->
  <rect x="428" y="15" width="40" height="18" rx="9" fill="#b31818"/>
  <rect x="435" y="20" width="26" height="7" rx="2" fill="rgba(255,255,255,0.85)"/>

  <!-- ── HERO AREA ── -->
  <!-- Mountain silhouette layers -->
  <path d="M0,170 L50,110 L90,130 L140,78 L195,115 L250,82 L310,108 L360,72 L420,95 L480,80 L480,170 Z" fill="#180303" opacity="0.9"/>
  <path d="M0,170 L40,130 L80,148 L130,100 L185,130 L240,98 L300,122 L355,90 L410,112 L480,96 L480,170 Z" fill="#0c0101" opacity="0.95"/>
  <!-- Red sunset glow above mountains -->
  <ellipse cx="160" cy="130" rx="100" ry="40" fill="rgba(179,24,24,0.15)" filter="url(#qBlur)"/>

  <!-- Hero copy block -->
  <rect x="40" y="64" width="14" height="14" rx="3" fill="#b31818"/>
  <rect x="60" y="68" width="90" height="7" rx="3" fill="rgba(255,255,255,0.45)"/>
  <rect x="40" y="88" width="200" height="20" rx="4" fill="rgba(255,255,255,0.95)"/>
  <rect x="40" y="115" width="160" height="12" rx="3" fill="rgba(255,255,255,0.65)"/>
  <rect x="40" y="133" width="120" height="8" rx="3" fill="rgba(255,255,255,0.38)"/>
  <!-- Buttons -->
  <rect x="40" y="150" width="78" height="28" rx="14" fill="#b31818"/>
  <rect x="49" y="158" width="60" height="12" rx="3" fill="rgba(255,255,255,0.85)"/>
  <rect x="128" y="150" width="78" height="28" rx="14" fill="transparent" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <rect x="137" y="158" width="60" height="12" rx="3" fill="rgba(255,255,255,0.50)"/>

  <!-- ── CARDS SECTION ── -->
  <rect x="0" y="186" width="480" height="94" fill="url(#qCards)"/>
  <rect x="0" y="186" width="480" height="1" fill="rgba(179,24,24,0.3)"/>

  <!-- Card 1 -->
  <rect x="14" y="200" width="140" height="66" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(179,24,24,0.25)" stroke-width="1"/>
  <circle cx="34" cy="220" r="10" fill="rgba(179,24,24,0.18)"/>
  <rect x="28" y="215" width="12" height="10" rx="2" fill="#b31818" opacity="0.7"/>
  <rect x="52" y="216" width="60" height="9" rx="3" fill="rgba(255,255,255,0.70)"/>
  <rect x="22" y="236" width="118" height="6" rx="2" fill="rgba(255,255,255,0.22)"/>
  <rect x="22" y="248" width="90" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="22" y="258" width="104" height="5" rx="2" fill="rgba(255,255,255,0.14)"/>

  <!-- Card 2 -->
  <rect x="170" y="200" width="140" height="66" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(179,24,24,0.25)" stroke-width="1"/>
  <circle cx="190" cy="220" r="10" fill="rgba(179,24,24,0.18)"/>
  <rect x="184" y="215" width="12" height="10" rx="2" fill="#b31818" opacity="0.7"/>
  <rect x="208" y="216" width="60" height="9" rx="3" fill="rgba(255,255,255,0.70)"/>
  <rect x="178" y="236" width="118" height="6" rx="2" fill="rgba(255,255,255,0.22)"/>
  <rect x="178" y="248" width="90" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="178" y="258" width="104" height="5" rx="2" fill="rgba(255,255,255,0.14)"/>

  <!-- Card 3 -->
  <rect x="326" y="200" width="140" height="66" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(179,24,24,0.25)" stroke-width="1"/>
  <circle cx="346" cy="220" r="10" fill="rgba(179,24,24,0.18)"/>
  <rect x="340" y="215" width="12" height="10" rx="2" fill="#b31818" opacity="0.7"/>
  <rect x="364" y="216" width="60" height="9" rx="3" fill="rgba(255,255,255,0.70)"/>
  <rect x="334" y="236" width="118" height="6" rx="2" fill="rgba(255,255,255,0.22)"/>
  <rect x="334" y="248" width="90" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>
  <rect x="334" y="258" width="104" height="5" rx="2" fill="rgba(255,255,255,0.14)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280">
  <defs>
    <linearGradient id="grpHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f0f4"/>
      <stop offset="100%" stop-color="#e4e4ea"/>
    </linearGradient>
    <linearGradient id="grpCard1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f8"/>
      <stop offset="100%" stop-color="#fef0f0"/>
    </linearGradient>
    <linearGradient id="grpCard2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="grpCard3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbf0"/>
      <stop offset="100%" stop-color="#fef3e0"/>
    </linearGradient>
  </defs>

  <!-- Light BG -->
  <rect width="480" height="280" fill="#f5f5f7"/>

  <!-- ── NAV ── -->
  <rect width="480" height="46" fill="rgba(255,255,255,0.94)"/>
  <line x1="0" y1="46" x2="480" y2="46" stroke="#e8e8ed" stroke-width="1"/>
  <!-- Logo mark -->
  <rect x="16" y="13" width="24" height="20" rx="5" fill="#1d1d1f"/>
  <rect x="20" y="17" width="16" height="12" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Brand text -->
  <rect x="46" y="16" width="62" height="9" rx="3" fill="#1d1d1f"/>
  <rect x="46" y="28" width="42" height="6" rx="2" fill="rgba(29,29,31,0.4)"/>
  <!-- Nav links -->
  <rect x="210" y="19" width="34" height="8" rx="3" fill="rgba(29,29,31,0.42)"/>
  <rect x="254" y="19" width="34" height="8" rx="3" fill="rgba(29,29,31,0.42)"/>
  <rect x="298" y="19" width="34" height="8" rx="3" fill="rgba(29,29,31,0.42)"/>
  <rect x="342" y="19" width="34" height="8" rx="3" fill="rgba(29,29,31,0.42)"/>
  <!-- CTA -->
  <rect x="390" y="13" width="74" height="20" rx="10" fill="#1d1d1f"/>
  <rect x="402" y="18" width="50" height="10" rx="3" fill="rgba(255,255,255,0.85)"/>

  <!-- ── HERO ── -->
  <rect x="0" y="46" width="480" height="104" fill="#ffffff"/>
  <!-- Center stack -->
  <rect x="90" y="64" width="300" height="18" rx="4" fill="#1d1d1f" opacity="0.92"/>
  <rect x="130" y="88" width="220" height="11" rx="3" fill="#1d1d1f" opacity="0.55"/>
  <rect x="150" y="104" width="180" height="8" rx="3" fill="rgba(29,29,31,0.32)"/>
  <!-- CTA buttons row -->
  <rect x="140" y="120" width="86" height="24" rx="12" fill="#1d1d1f"/>
  <rect x="152" y="127" width="62" height="10" rx="3" fill="rgba(255,255,255,0.85)"/>
  <rect x="236" y="120" width="86" height="24" rx="12" fill="transparent" stroke="#d2d2d7" stroke-width="1.5"/>
  <rect x="248" y="127" width="62" height="10" rx="3" fill="rgba(29,29,31,0.55)"/>

  <!-- Divider -->
  <line x1="24" y1="150" x2="456" y2="150" stroke="#e8e8ed" stroke-width="1"/>

  <!-- ── DIVISIONS SECTION ── -->
  <rect x="0" y="150" width="480" height="130" fill="#f5f5f7"/>
  <!-- Section heading -->
  <rect x="24" y="162" width="88" height="10" rx="3" fill="#1d1d1f" opacity="0.80"/>
  <rect x="24" y="178" width="152" height="7" rx="2" fill="rgba(29,29,31,0.32)"/>

  <!-- Division card 1 — Quarry (red) -->
  <rect x="24" y="198" width="132" height="72" rx="14" fill="url(#grpCard1)" stroke="rgba(179,24,24,0.12)" stroke-width="1"/>
  <rect x="36" y="210" width="22" height="22" rx="6" fill="rgba(179,24,24,0.12)"/>
  <path d="M42,221 L47,215 L52,221 L47,227 Z" fill="#b31818" opacity="0.8"/>
  <rect x="64" y="214" width="72" height="9" rx="3" fill="#1d1d1f" opacity="0.80)"/>
  <rect x="36" y="240" width="106" height="6" rx="2" fill="rgba(29,29,31,0.28)"/>
  <rect x="36" y="252" width="80" height="6" rx="2" fill="rgba(29,29,31,0.22)"/>
  <rect x="36" y="260" width="60" height="5" rx="2" fill="rgba(179,24,24,0.45)"/>

  <!-- Division card 2 — Tech (indigo) -->
  <rect x="174" y="198" width="132" height="72" rx="14" fill="url(#grpCard2)" stroke="rgba(70,65,240,0.12)" stroke-width="1"/>
  <rect x="186" y="210" width="22" height="22" rx="6" fill="rgba(70,65,240,0.12)"/>
  <rect x="191" y="216" width="12" height="10" rx="3" fill="#4641f0" opacity="0.75"/>
  <rect x="214" y="214" width="72" height="9" rx="3" fill="#1d1d1f" opacity="0.80"/>
  <rect x="186" y="240" width="106" height="6" rx="2" fill="rgba(29,29,31,0.28)"/>
  <rect x="186" y="252" width="80" height="6" rx="2" fill="rgba(29,29,31,0.22)"/>
  <rect x="186" y="260" width="60" height="5" rx="2" fill="rgba(70,65,240,0.45)"/>

  <!-- Division card 3 — Store (gold) -->
  <rect x="324" y="198" width="132" height="72" rx="14" fill="url(#grpCard3)" stroke="rgba(200,150,10,0.12)" stroke-width="1"/>
  <rect x="336" y="210" width="22" height="22" rx="6" fill="rgba(200,150,10,0.12)"/>
  <rect x="341" y="216" width="12" height="10" rx="3" fill="#c8960a" opacity="0.75"/>
  <rect x="364" y="214" width="72" height="9" rx="3" fill="#1d1d1f" opacity="0.80"/>
  <rect x="336" y="240" width="106" height="6" rx="2" fill="rgba(29,29,31,0.28)"/>
  <rect x="336" y="252" width="80" height="6" rx="2" fill="rgba(29,29,31,0.22)"/>
  <rect x="336" y="260" width="60" height="5" rx="2" fill="rgba(200,150,10,0.45)"/>
</svg>
